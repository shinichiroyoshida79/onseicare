<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易音声認識アプリ（自動コピー付き）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.5rem;
            color: #4a4a4a;
        }
        #status {
            font-weight: bold;
            color: #d9534f;
            margin-bottom: 20px;
            height: 20px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        button, .link-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button:hover, .link-btn:hover {
            opacity: 0.9;
        }
        button:active, .link-btn:active {
            transform: scale(0.98);
        }
        
        /* 録音ボタンの状態 */
        button.recording {
            background-color: #d9534f;
        }
        
        /* 各ボタンの色分け */
        #copy-btn { background-color: #607d8b; } /* グレー系 */
        
        /* アセスメント作成（青） */
        #assessment-link { background-color: #2196F3; }
        
        /* ケアプランCSV（オレンジ） */
        #csv-link { background-color: #FF9800; }

        #result {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 150px;
            text-align: left;
            background-color: #fafafa;
            font-size: 1.1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .final-text { color: #000; }
        .interim-text { color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 簡易音声認識アプリ</h1>
    <div id="status">マイクの準備ができています</div>
    
    <div class="btn-group">
        <button id="toggle-btn">録音開始</button>
        <button id="copy-btn">テキストをコピー</button>
        
        <a href="https://gemini.google.com/gem/19NLRpiGMud8mwiH8T5wmMG4YFsw_bUHC?usp=sharing" 
           target="_blank" rel="noopener noreferrer" class="link-btn" id="assessment-link">アセスメント作成</a>
           
        <a href="https://gemini.google.com/gem/1_CThdo3gexbPOTARcjarW6K9v7csTDkG?usp=sharing" 
           target="_blank" rel="noopener noreferrer" class="link-btn" id="csv-link">ケアプランCSV</a>
    </div>
    
    <div id="result">ここに文字起こしされたテキストが表示されます...</div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("お使いのブラウザは音声認識に対応していません。Google Chromeをご利用ください。");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;
        
        let isRecording = false;
        let finalText = '';

        const toggleBtn = document.getElementById('toggle-btn');
        const copyBtn = document.getElementById('copy-btn');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');

        const copyToClipboard = () => {
            if (!finalText.trim()) return;
            navigator.clipboard.writeText(finalText).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ コピー完了';
                setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
            });
        };

        toggleBtn.addEventListener('click', () => {
            if (isRecording) {
                recognition.stop();
                copyToClipboard();
            } else {
                recognition.start();
            }
        });

        copyBtn.addEventListener('click', copyToClipboard);

        recognition.onstart = () => {
            isRecording = true;
            toggleBtn.textContent = '録音停止 (自動コピー)';
            toggleBtn.classList.add('recording');
            statusDiv.textContent = '🔴 録音中...';
        };

        recognition.onend = () => {
            isRecording = false;
            toggleBtn.textContent = '録音開始';
            toggleBtn.classList.remove('recording');
            statusDiv.textContent = 'マイクの準備ができています';
        };

        recognition.onresult = (event) => {
            let interimText = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    finalText += event.results[i][0].transcript + '\n';
                } else {
                    interimText = event.results[i][0].transcript;
                }
            }
            resultDiv.innerHTML = '<span class="final-text">' + finalText + '</span>' + 
                                 '<span class="interim-text">' + interimText + '</span>';
        };

        recognition.onerror = (event) => {
            statusDiv.textContent = 'エラー: ' + event.error;
            isRecording = false;
        };
    }
</script>

</body>
</html>
